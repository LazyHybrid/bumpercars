<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bumper Cars P2P</title>
  </head>
  <body>
    <div id="app">
      <div id="pause-menu" class="pause-menu" style="display:none">
        <div class="pause-menu__content">
          <div id="pause-who-label" style="font-weight:bold;margin-bottom:0.5em;color:#fff;"></div>
          <h2>Paused</h2>
          <button id="new-match-btn" class="hud__new-match">New Match</button>
          <div id="match-timer">00:00</div>
          <button id="resume-btn" class="pause-menu__resume">Resume</button>
        </div>
      </div>
      <div id="play-hud" class="hud">
        <div class="hud__card">
          <p class="eyebrow">P2P room</p>
          <h1>Bumper Cars</h1>
          <p id="room-label"></p>
          <div class="hud__actions">
            <button id="toggle-edit" type="button">Edit Map</button>
            <button id="toggle-play" type="button" style="display:none">Play Game</button>
            <button id="copy-link" type="button">Copy join link</button>
            <button id="new-room" type="button">New room</button>
            <button id="ready-btn" type="button" style="display:none">Ready</button>
          </div>
          <p class="hint">Use WASD to drive. Open the copied link in another browser to join the same arena.</p>
        </div>
        <div class="hud__card hud__card--small">
          <p class="eyebrow">Session</p>
          <div class="name-input-group">
            <label for="player-name">Your Name:</label>
            <input type="text" id="player-name" maxlength="20" placeholder="Enter your name">
            <button id="name-submit-btn">Enter</button>
            <span id="name-feedback" class="name-feedback"></span>
          </div>
          <p id="peer-count">1 player connected</p>
          <p id="status">Connecting to room...</p>
        </div>
      </div>
      <div id="editor-hud" class="hud" style="display:none"></div>
      <div id="scene"></div>
      <div id="ability-slots" style="display:none">
        <div id="ability-slot-left" class="ability-slot" data-empty="true">
          <span id="ability-slot-left-icon" class="ability-slot__icon"></span>
          <span id="ability-slot-left-badge" class="ability-slot__badge" style="display:none"></span>
        </div>
        <div id="ability-slot-right" class="ability-slot" data-empty="true">
          <span id="ability-slot-right-icon" class="ability-slot__icon"></span>
          <span id="ability-slot-right-badge" class="ability-slot__badge" style="display:none"></span>
        </div>
      </div>
      <div id="ability-cooldown-indicator" aria-live="polite" style="display:none">
        <div id="ability-cooldown-ring"></div>
        <div id="ability-cooldown-icon">⚡</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
  </html>
